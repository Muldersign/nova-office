name: Deploy preview

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build, test and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        env:
          VITE_SUPABASE_URL: https://iwgdsinkprrfarrxrpik.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml3Z2RzaW5rcHJyZmFycnhycGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNjk3MTEsImV4cCI6MjA5ODY0NTcxMX0.CBM2gUoEox91Z17y4_oBzZRAQOylrMe2JZqZMdoEi0Q
        run: npm run build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          cname: brenqo.nl
